# Cloudflare Worker config — NEX SPORTS (via OpenNext)
# Docs: https://opennext.js.org/cloudflare

name = "nex-sports"
main = ".open-next/worker.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true

# Custom domain routes
routes = [
  { pattern = "nexsportts.com.br", custom_domain = true },
  { pattern = "www.nexsportts.com.br", custom_domain = true },
  { pattern = "admin.nexsportts.com.br", custom_domain = true },
]

# Static assets binding (Next public + .open-next/assets)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# R2 incremental cache — enable R2 in CF dashboard then uncomment
# [[r2_buckets]]
# binding = "NEXT_INC_CACHE_R2_BUCKET"
# bucket_name = "nex-sports-cache"
# preview_bucket_name = "nex-sports-cache-preview"

# Env vars set via CF dashboard / wrangler secret put
# Required at runtime:
#   NEXT_PUBLIC_SITE_URL
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY    (secret)
#   SUPABASE_SECRET_KEY          (secret)
#   RESEND_API_KEY               (secret)
#   EMAIL_FROM
#   MP_ACCESS_TOKEN              (secret, optional until checkout enabled)
#   MP_PUBLIC_KEY                (optional)
#   MP_WEBHOOK_SECRET            (secret, optional)
